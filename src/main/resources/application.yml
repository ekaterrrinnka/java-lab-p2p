spring:
  datasource:
    url: jdbc:h2:mem:p2pdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

integration:
  binance-p2p:
    url: https://p2p.binance.com/bapi/c2c/v2/friendly/c2c/adv/search
    trade-type: BUY
    fiat: UAH
    asset: USDT
    rows: 20
